<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* Background Canvas */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Entry Gate */
#gate {
  position: fixed;
  inset: 0;
  background: #e797f7;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999; /* Higher than everything else */
}

#gate button {
  font-size: clamp(18px, 4vw, 22px);
  padding: clamp(12px, 3vw, 18px) clamp(24px, 6vw, 36px);
  background: #D0787C;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: #fff;
  transition: 0.3s ease;
}

#gate button:hover {
  background: #ff91b8;
  transform: scale(1.05);
}

#frameWrap {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

#frame {
  width: clamp(300px, 80%, 450px);
  padding: clamp(20px, 4vw, 35px);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 14px;
  background: rgba(0,0,0,0.5); /* Slightly darker for readability */
  backdrop-filter: blur(8px);
  box-shadow: 0 0 30px rgba(0,255,255,0.15);
  pointer-events: none;
  filter: blur(6px);
  transition: filter 0.5s ease;
}

h1 { margin: 0 0 8px; font-size: clamp(18px, 4vw, 26px); }
p { margin: 4px 0; font-size: clamp(14px, 3vw, 18px); }

button.main {
  margin-top: 15px;
  padding: 12px 24px;
  background: #c51414;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: #fff;
  transition: 0.3s;
}

#barWrap {
  width: 100%;
  height: 10px;
  background: #222;
  margin-top: 15px;
  border-radius: 5px;
  overflow: hidden;
}

#bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg,#c33010,#ff5a2a);
}

#downloadPage {
  display: none;
  flex-direction: column;
  gap: 10px;
  margin-top: 15px;
}

.fileRow {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: rgba(0,0,128,0.3);
  border-radius: 5px;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="gate">
  <button id="enter">Click to Enter</button>
</div>

<div id="frameWrap">
  <div id="frame">
    <h1>Hi, привет</h1>
    <p>I'm Minta</p>
    <p>Я Code Engineer 👍🧑‍🎓</p>

    <button class="main" id="downloadBtn">Click me</button>

    <div id="barWrap"><div id="bar"></div></div>
    <div id="time">Time: 0s</div>

    <div id="downloadPage">
      Loading files...
      <button id="exitDownload">Exit</button>
    </div>

    <audio id="bgm" src="https://minta1234.github.io/WEb/assets/Black_sult.mp3" loop></audio>
    <audio id="fx" src="https://minta1234.github.io/WEb/assets/ENO-soam-tan.mp3"></audio>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const frame = document.getElementById("frame");
function getFrameBox(){ 
  const r = frame.getBoundingClientRect(); 
  return {x:r.left, y:r.top, w:r.width, h:r.height}; 
}
function inFrame(x,y,box){ return x>box.x && x<box.x+box.w && y>box.y && y<box.y+box.h; }

const dots = [];
const MAX = 140;
for(let i=0; i<MAX; i++){
  dots.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2+0.6,
    vx: (Math.random()-.5)*0.4,
    vy: (Math.random()-.5)*0.4,
    col: Math.random()<0.7 ? "#061459" : "#D0787C"
  });
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background Gradient
  const g = ctx.createLinearGradient(0,0,canvas.width,0);
  g.addColorStop(0,"#41DFFF");
  g.addColorStop(1,"#3CFFB6");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const box = getFrameBox();
  for(const p of dots){
    p.x += p.vx;
    p.y += p.vy;

    if(inFrame(p.x, p.y, box)){
      p.vx *= -1;
      p.vy *= -1;
    }

    if(p.x<0) p.x=canvas.width;
    if(p.x>canvas.width) p.x=0;
    if(p.y<0) p.y=canvas.height;
    if(p.y>canvas.height) p.y=0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.col;
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();

const gate = document.getElementById("gate");
const enter = document.getElementById("enter");
const bgm = document.getElementById("bgm");
const fx = document.getElementById("fx");

enter.onclick = () => {
  gate.style.display = "none";
  frame.style.pointerEvents = "auto";
  frame.style.filter = "none";
  bgm.play().catch(e => console.log("Audio play blocked"));
};

// Timer logic
let sec = 0;
const timeElem = document.getElementById("time");
setInterval(() => {
  sec++;
  timeElem.textContent = `Time: ${Math.floor(sec/60)}m ${sec%60}s`;
}, 1000);

// Audio/Bar Logic
fx.ontimeupdate = () => {
  if(fx.duration) document.getElementById("bar").style.width = (fx.currentTime/fx.duration*100) + "%";
};

const GITHUB_USER = "Minta1234";
const GITHUB_REPO = "WEb";
const DOWNLOAD_PATH = "Download"; 

document.getElementById("downloadBtn").onclick = async () => {
  document.getElementById("downloadPage").style.display = "flex";
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DOWNLOAD_PATH}`);
    const files = await res.json();
    const container = document.getElementById("downloadPage");
    container.innerHTML = '<button id="exitDownload">Exit</button>';
    
    files.forEach(f => {
      if(f.type === "file") {
        const row = document.createElement("div");
        row.className = "fileRow";
        row.innerHTML = `<span>${f.name}</span><button onclick="downloadFile('${f.download_url}', '${f.name}')">Get</button>`;
        container.appendChild(row);
      }
    });
    
    document.getElementById("exitDownload").onclick = () => container.style.display = "none";
  } catch (e) { console.error(e); }
};

async function downloadFile(url, name) {
  fx.play();
  bgm.pause();
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  a.click();
}
</script>
</body>
</html>
